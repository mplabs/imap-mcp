services:
  imap-mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # rw so the setup wizard can write config.yaml on first start
      - ./config:/config
    environment:
      # Required for production: set this to your public HTTPS URL so that
      # the OAuth flow works for external clients (e.g. Claude Cowork).
      # Without it the server defaults to http://localhost:8000 and will
      # only work for local testing.
      - IMAP_MCP_ISSUER_URL=${IMAP_MCP_ISSUER_URL:-http://localhost:8000}
      # Add further entries if you use secret_ref: "env:..." in config.yaml.
      # Example: - IMAP_PERSONAL_PASS=${IMAP_PERSONAL_PASS}
    restart: unless-stopped
