services:
  imap-mcp:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # rw so the setup wizard can write config.yaml on first start
      - ./config:/config
    # No credentials needed — the setup wizard collects them via the browser.
    # Add an environment: section only if you use secret_ref: "env:..." in a
    # manually written config. Example:
    # environment:
    #   - IMAP_PERSONAL_PASS=${IMAP_PERSONAL_PASS}
    restart: unless-stopped
